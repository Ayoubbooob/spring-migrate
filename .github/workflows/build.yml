name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java-version: [ 17 ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -B

      - name: Run tests
        run: mvn test -B

      - name: Verify JAR exists
        run: |
          if [ ! -f target/spring-migrate-1.0-SNAPSHOT.jar ]; then
            echo "JAR not found!"
            exit 1
          fi
          echo "JAR built successfully"

      - name: Smoke test — CLI runs
        run: |
          java -jar target/spring-migrate-1.0-SNAPSHOT.jar --help

