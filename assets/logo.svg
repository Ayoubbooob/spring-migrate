<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6DB33F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A8C2A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2D6A4F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6DB33F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B2A1B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D1F0D;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="url(#bgGrad)" filter="url(#shadow)"/>
  <circle cx="200" cy="200" r="186" fill="none" stroke="#6DB33F" stroke-width="1.5" opacity="0.3"/>

  <!-- Spring leaf -->
  <g transform="translate(200, 170)" filter="url(#glow)">
    <!-- Main leaf shape -->
    <path d="M0,-80 C40,-70 70,-30 60,10 C50,50 20,70 0,80 C-20,70 -50,50 -60,10 C-70,-30 -40,-70 0,-80Z"
          fill="url(#leafGrad)" opacity="0.95"/>
    <!-- Leaf center vein -->
    <line x1="0" y1="-65" x2="0" y2="65" stroke="#3D7A20" stroke-width="2.5" opacity="0.6"/>
    <!-- Leaf side veins -->
    <line x1="0" y1="-40" x2="-30" y2="-10" stroke="#3D7A20" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="-40" x2="30" y2="-10" stroke="#3D7A20" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="-10" x2="-35" y2="20" stroke="#3D7A20" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="-10" x2="35" y2="20" stroke="#3D7A20" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="20" x2="-25" y2="45" stroke="#3D7A20" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="20" x2="25" y2="45" stroke="#3D7A20" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Migration arrow (wrapping around the leaf) -->
  <g filter="url(#glow)">
    <!-- Curved arrow path -->
    <path d="M120,290 C90,260 80,220 95,185 C105,160 125,145 145,138"
          fill="none" stroke="url(#arrowGrad)" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
    <!-- Arrow continues on right -->
    <path d="M255,138 C275,145 295,160 305,185 C320,220 310,260 280,290"
          fill="none" stroke="url(#arrowGrad)" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
    <!-- Right arrowhead -->
    <polygon points="280,290 295,270 268,275" fill="#6DB33F" opacity="0.9"/>
    <!-- Left arrowhead (pointing up/forward) -->
    <polygon points="120,290 105,270 132,275" fill="#2D6A4F" opacity="0.9"/>
  </g>

  <!-- Version indicators -->
  <!-- "old" label on the left -->
  <g transform="translate(95, 310)">
    <rect x="-35" y="-14" width="70" height="28" rx="6" fill="#2D6A4F" opacity="0.85"/>
    <text x="0" y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#A8D98A">old ver.</text>
  </g>

  <!-- Arrow between versions -->
  <g transform="translate(200, 316)">
    <text x="0" y="0" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" fill="#6DB33F" opacity="0.7">→</text>
  </g>

  <!-- "new" label on the right -->
  <g transform="translate(305, 310)">
    <rect x="-35" y="-14" width="70" height="28" rx="6" fill="#6DB33F" opacity="0.85"/>
    <text x="0" y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">new ver.</text>
  </g>

  <!-- Subtle decorative dots -->
  <circle cx="140" cy="100" r="2" fill="#6DB33F" opacity="0.3"/>
  <circle cx="260" cy="100" r="2" fill="#6DB33F" opacity="0.3"/>
  <circle cx="310" cy="150" r="1.5" fill="#6DB33F" opacity="0.2"/>
  <circle cx="90" cy="150" r="1.5" fill="#6DB33F" opacity="0.2"/>
  <circle cx="160" cy="350" r="1.5" fill="#6DB33F" opacity="0.2"/>
  <circle cx="240" cy="350" r="1.5" fill="#6DB33F" opacity="0.2"/>
</svg>


